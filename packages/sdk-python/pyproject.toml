[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "qrapi"
version = "0.1.0"
description = "SDK oficial Python para a QR-API (WhatsApp API da Flipt). Zero dependencias."
readme = "README.md"
requires-python = ">=3.8"
license = { text = "MIT" }
authors = [{ name = "Flipt" }]
keywords = ["whatsapp", "qr-api", "qrapi", "messaging", "flipt"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Communications :: Chat",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = []

[project.urls]
Homepage = "https://qrapi.flipt.com.br"
Documentation = "https://qrapi.flipt.com.br/docs"

[tool.setuptools]
packages = ["qrapi"]
