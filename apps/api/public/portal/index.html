<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR-API, Portal</title>

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonte Inter (Google Fonts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- ===========================================================
       Configuracao do Tailwind inline + design tokens
       =========================================================== -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Arial', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            // Sidebar
            'side-bg':    '#071625',
            'side-text':  '#D8E4EF',
            'side-muted': '#7E93AB',
            // Surface
            'app-bg':     '#F7F9FB',
            'card-bg':    '#FFFFFF',
            'card-border':'#E5EAF0',
            // Brand
            'brand':      '#00B84A',
            'brand-dark': '#008A36',
            'brand-soft': '#19C85A',
            // Text
            'ink':        '#111827',
            'ink-soft':   '#374151',
            'ink-2':      '#6B7280',
            'ink-3':      '#94A3B8',
          },
          boxShadow: {
            'card': '0 8px 24px rgba(15,23,42,0.04)',
            'card-hover': '0 12px 32px rgba(15,23,42,0.08)',
            'pop': '0 16px 48px rgba(15,23,42,0.12)',
          },
          borderRadius: {
            'xl2': '12px',
          },
        }
      }
    }
  </script>

  <style>
    /* ===========================================================
       Estilos custom: base, tipografia, scrollbar, animacoes
       =========================================================== */
    html, body { font-family: 'Inter', Arial, sans-serif; font-size: 14px; }
    body { background: #F7F9FB; color: #111827; -webkit-font-smoothing: antialiased; }

    /* Scrollbar mais discreta */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    /* Scrollbar dentro da sidebar (tons escuros) */
    .side-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }
    .side-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

    /* Card padrao */
    .card {
      background: #FFFFFF;
      border: 1px solid #E5EAF0;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(15,23,42,0.04);
    }

    /* Labels uppercase para KPIs */
    .label-up {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6B7280;
    }

    /* Badge base */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1.5;
    }
    .badge-success { background:#DCFCE7; color:#15803D; }
    .badge-warning { background:#FEF3C7; color:#B45309; }
    .badge-danger  { background:#FEE2E2; color:#B91C1C; }
    .badge-info    { background:#DBEAFE; color:#1D4ED8; }
    .badge-muted   { background:#F1F5F9; color:#64748B; }

    /* Sidebar item */
    .side-item {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 14px; margin: 1px 8px;
      border-radius: 8px;
      color: #B6C5D6;
      font-weight: 500;
      font-size: 13.5px;
      cursor: pointer;
      transition: background .15s, color .15s;
      border-left: 3px solid transparent;
      padding-left: 11px;
    }
    .side-item:hover { background: rgba(255,255,255,0.04); color: #fff; }
    .side-item.active {
      background: rgba(0, 200, 83, 0.18);
      border-left: 3px solid #00C853;
      color: #19C85A;
    }
    .side-item.active svg { color: #19C85A; }
    .side-item svg { width: 18px; height: 18px; flex: none; }
    .side-section-title {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #5D7493;
      padding: 16px 22px 6px;
    }

    /* Botoes */
    .btn {
      display: inline-flex; align-items: center; gap: 8px; justify-content: center;
      border-radius: 10px;
      font-weight: 600; font-size: 13.5px;
      padding: 8px 14px;
      transition: background .15s, color .15s, box-shadow .15s, border-color .15s;
      cursor: pointer;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .btn[disabled] { opacity: .5; cursor: not-allowed; }
    .btn-primary { background:#00B84A; color:#fff; }
    .btn-primary:hover:not([disabled]) { background:#008A36; }
    .btn-secondary { background:#FFFFFF; color:#111827; border-color:#E5EAF0; }
    .btn-secondary:hover:not([disabled]) { background:#F7F9FB; }
    .btn-ghost { background: transparent; color:#374151; }
    .btn-ghost:hover:not([disabled]) { background:#F1F5F9; }
    .btn-dark { background:#0F172A; color:#fff; }
    .btn-dark:hover:not([disabled]) { background:#1E293B; }
    .btn-danger { background:#FEE2E2; color:#B91C1C; }
    .btn-danger:hover:not([disabled]) { background:#FCA5A5; color:#7F1D1D; }
    .btn-sm { padding: 6px 10px; font-size: 12.5px; }
    .btn-lg { padding: 11px 18px; font-size: 14.5px; }

    /* Inputs */
    .input, .select, .textarea {
      width: 100%;
      background: #FFFFFF;
      border: 1px solid #E5EAF0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13.5px;
      color: #111827;
      transition: border-color .15s, box-shadow .15s;
    }
    .input:focus, .select:focus, .textarea:focus {
      outline: none;
      border-color: #00B84A;
      box-shadow: 0 0 0 3px rgba(0,184,74,0.12);
    }
    .input[disabled], .select[disabled], .textarea[disabled] {
      background:#F7F9FB; color:#94A3B8; cursor: not-allowed;
    }
    .field-label {
      display:block; font-size: 12.5px; font-weight: 600; color:#374151; margin-bottom: 6px;
    }
    .field-help { font-size: 12px; color:#94A3B8; margin-top: 4px; }

    /* Foco visivel acessivel */
    button:focus-visible, a:focus-visible, .side-item:focus-visible {
      outline: 2px solid #00B84A; outline-offset: 2px;
    }

    /* Topbar search com atalho */
    .topbar-search {
      display: flex; align-items: center; gap: 10px;
      background: #F1F5F9; border: 1px solid #E5EAF0; border-radius: 10px;
      padding: 8px 12px;
      width: 380px; max-width: 100%;
    }
    .topbar-search input {
      background: transparent; border: none; outline: none; flex: 1;
      font-size: 13.5px; color: #111827;
    }
    .topbar-search input::placeholder { color: #94A3B8; }
    .kbd {
      display: inline-flex; align-items: center; justify-content: center;
      background: #FFFFFF; border: 1px solid #E5EAF0; border-bottom-width: 2px;
      border-radius: 6px;
      padding: 1px 6px;
      font-size: 11px; color: #6B7280; font-weight: 600;
      font-family: 'Inter', sans-serif;
    }

    /* Animacao pulse para skeletons */
    @keyframes skel-pulse { 0% { opacity: 1; } 50% { opacity: .5; } 100% { opacity: 1; } }
    .skel { background: #E5EAF0; border-radius: 6px; animation: skel-pulse 1.4s ease-in-out infinite; }

    /* Toasts */
    .toast {
      display:flex; align-items:flex-start; gap:12px;
      background:#FFFFFF; border:1px solid #E5EAF0;
      border-radius: 12px; padding: 12px 14px;
      box-shadow: 0 16px 48px rgba(15,23,42,0.12);
      width: 320px;
      animation: toast-in .25s ease-out;
    }
    @keyframes toast-in { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .toast-success { border-left: 3px solid #16A34A; }
    .toast-error { border-left: 3px solid #EF4444; }
    .toast-info { border-left: 3px solid #3B82F6; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 80;
      background: rgba(15,23,42,0.55); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
      animation: fade-in .15s ease-out;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .modal-card {
      background: #FFFFFF; border-radius: 16px;
      width: 480px; max-width: 100%;
      box-shadow: 0 32px 64px rgba(15,23,42,0.24);
      animation: pop-in .2s ease-out;
    }
    @keyframes pop-in { from { transform: scale(.96); opacity:0; } to { transform: scale(1); opacity:1; } }

    /* Tabela */
    table.qr-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    table.qr-table thead th {
      text-align: left; font-weight: 600; font-size: 12px;
      color: #6B7280; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 10px 16px; background:#F8FAFC; border-bottom: 1px solid #E5EAF0;
    }
    table.qr-table tbody td {
      padding: 14px 16px; border-bottom: 1px solid #F1F5F9; color: #111827;
    }
    table.qr-table tbody tr:last-child td { border-bottom: none; }
    table.qr-table tbody tr:hover { background: #FAFBFC; }

    /* Tabs */
    .tabs { display: inline-flex; background:#F1F5F9; border-radius: 10px; padding: 3px; }
    .tab {
      padding: 6px 14px; font-size: 13px; font-weight: 600; color:#6B7280;
      border-radius: 8px; cursor: pointer; transition: background .15s, color .15s;
    }
    .tab.active { background: #FFFFFF; color:#111827; box-shadow: 0 1px 3px rgba(15,23,42,0.06); }

    /* Code block */
    .code-block {
      background: #0F172A; color: #E2E8F0;
      font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.65;
      border-radius: 10px; padding: 16px; overflow-x: auto;
      white-space: pre;
    }
    .code-block .tk-key { color: #7DD3FC; }
    .code-block .tk-str { color: #86EFAC; }
    .code-block .tk-num { color: #FCD34D; }
    .code-block .tk-com { color: #64748B; font-style: italic; }
    .code-block .tk-fn  { color: #C4B5FD; }

    /* Progress */
    .progress { background:#F1F5F9; border-radius: 999px; height: 8px; overflow: hidden; }
    .progress > div { background: linear-gradient(90deg, #00B84A, #19C85A); height: 100%; border-radius: 999px; transition: width .3s; }

    /* Tooltip simples */
    [data-tip] { position: relative; }
    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background:#0F172A; color:#fff; padding:6px 10px; border-radius:8px;
      font-size: 11.5px; white-space: nowrap; z-index: 70;
      box-shadow: 0 8px 16px rgba(0,0,0,0.18);
    }

    /* Logo grid de QR pixels */
    .qr-logo { display: inline-grid; grid-template-columns: repeat(4, 1fr); gap: 2px; width: 22px; height: 22px; }
    .qr-logo span { background:#19C85A; border-radius: 1.5px; }
    .qr-logo span.off { background: transparent; }

    /* Skeleton helpers */
    .skel-line { height: 14px; border-radius: 6px; }
    .skel-circle { border-radius: 999px; }

    /* Estado vazio */
    .empty {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding: 48px 24px; text-align: center; color:#6B7280;
    }
    .empty .empty-icon {
      width: 64px; height: 64px; border-radius: 999px;
      background: #ECFDF5; color:#16A34A;
      display:flex; align-items:center; justify-content:center;
      margin-bottom: 16px;
    }

    /* Hide scrollbar nas tabs scrollaveis */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <!-- =========================================================================
       Root da aplicacao. O JS no fim do arquivo monta a UI aqui.
       ========================================================================= -->
  <div id="app"></div>

  <!-- Container fixo de toasts -->
  <div id="toasts" class="fixed bottom-6 right-6 z-[90] flex flex-col gap-3"></div>

  <!-- Container de modal (fora do app pra nao ser substituido em re-render) -->
  <div id="modal-root"></div>

<script>
/* =============================================================================
 * QR-API Portal Cliente - SPA single-file
 * Tudo vanilla JS, sem framework. Router por hash. Auth JWT em localStorage.
 * ============================================================================= */

const API_BASE = '/portal/api';
const DOCS_URL = 'https://github.com/joaogorila/qr-api';

// Token JWT persistido
let token = localStorage.getItem('qrapi_token') || null;

// Estado global em memoria
const state = {
  me: null,           // dados de /me
  instances: [],      // /instances
  keys: [],           // /keys
  plans: [],          // /plans
  providers: { mercadopago: true, stripe: false },
  defaultProvider: 'mercadopago',
  invoices: [],       // /billing/invoices
  loading: false,
};

/* ---------- Utilidades --------------------------------------------------- */

function $(sel, root=document) { return root.querySelector(sel); }
function $$(sel, root=document) { return Array.from(root.querySelectorAll(sel)); }
function el(html) {
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstChild;
}
function money(n) {
  if (n == null || isNaN(n)) return 'R$ —';
  return 'R$ ' + Number(n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDate(s) {
  if (!s) return '—';
  try {
    const d = new Date(s);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  } catch { return '—'; }
}
function relTime(s) {
  if (!s) return 'nunca';
  const d = new Date(s);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'agora';
  if (diff < 3600) return Math.floor(diff/60) + 'min atras';
  if (diff < 86400) return Math.floor(diff/3600) + 'h atras';
  return Math.floor(diff/86400) + 'd atras';
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// Wrapper fetch com auth e tratamento de erro padronizado
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API_BASE + path, {
    method: opts.method || 'GET',
    headers,
    ...(opts.body ? { body: JSON.stringify(opts.body) } : {})
  });
  let data = {};
  try { data = await res.json(); } catch { /* sem body */ }
  if (!res.ok) {
    const msg = data?.error?.message || data?.error || data?.message || 'Erro inesperado';
    throw new Error(msg);
  }
  return data;
}

/* ---------- Toasts ------------------------------------------------------- */

function toast(message, type = 'info') {
  const root = $('#toasts');
  const icon = type === 'success' ? 'check-circle-2'
             : type === 'error' ? 'alert-circle'
             : 'info';
  const color = type === 'success' ? 'text-green-600'
              : type === 'error' ? 'text-red-600'
              : 'text-blue-600';
  const node = el(`
    <div class="toast toast-${type}">
      <div class="${color} mt-0.5"><i data-lucide="${icon}" class="w-5 h-5"></i></div>
      <div class="flex-1">
        <div class="text-sm font-semibold text-ink">${escapeHtml(message)}</div>
      </div>
      <button type="button" class="text-ink-3 hover:text-ink" aria-label="Fechar">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>
  `);
  node.querySelector('button').addEventListener('click', () => node.remove());
  root.appendChild(node);
  lucide.createIcons();
  setTimeout(() => { node.style.opacity = '0'; node.style.transition = 'opacity .25s'; setTimeout(()=>node.remove(), 250); }, 4000);
}

/* ---------- Modal -------------------------------------------------------- */

function openModal({ title, body, footer, dismissOnOverlay = false, size = 480 }) {
  const root = $('#modal-root');
  root.innerHTML = '';
  const overlay = el(`
    <div class="modal-overlay">
      <div class="modal-card" style="width:${size}px" role="dialog" aria-modal="true">
        <div class="flex items-center justify-between px-6 pt-5 pb-3">
          <h3 class="text-lg font-semibold text-ink">${escapeHtml(title)}</h3>
          <button type="button" class="text-ink-3 hover:text-ink modal-close" aria-label="Fechar">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        <div class="px-6 pb-4 modal-body"></div>
        <div class="px-6 py-4 bg-[#F8FAFC] rounded-b-2xl border-t border-card-border flex items-center justify-end gap-2 modal-footer"></div>
      </div>
    </div>
  `);
  const bodyEl = overlay.querySelector('.modal-body');
  const footerEl = overlay.querySelector('.modal-footer');
  if (typeof body === 'string') bodyEl.innerHTML = body; else bodyEl.appendChild(body);
  if (footer) {
    if (typeof footer === 'string') footerEl.innerHTML = footer;
    else footerEl.appendChild(footer);
  } else {
    footerEl.remove();
  }
  overlay.querySelector('.modal-close').addEventListener('click', closeModal);
  if (dismissOnOverlay) {
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  }
  root.appendChild(overlay);
  lucide.createIcons();
  return overlay;
}
function closeModal() { $('#modal-root').innerHTML = ''; }

/* =========================================================================
 *  ROUTER
 *    Hash routing: #/login, #/signup, #/dashboard, #/instances,
 *                  #/developers, #/billing, #/coming-soon/:slug
 * ========================================================================= */

const ROUTES = {
  'login':       renderAuth,
  'signup':      () => renderAuth('signup'),
  'dashboard':   renderDashboard,
  'instances':   renderInstances,
  'developers':  renderDevelopers,
  'billing':     renderBilling,
  'coming-soon': renderComingSoon,
};

function go(path) {
  if (location.hash !== '#' + path) location.hash = path;
  else handleRoute();
}

function handleRoute() {
  const hash = location.hash.replace(/^#/, '') || '/';
  const parts = hash.split('/').filter(Boolean);
  // Sem token: forca login (exceto signup)
  if (!token) {
    const route = parts[0] || 'login';
    if (route !== 'login' && route !== 'signup') { location.hash = '/login'; return; }
    return ROUTES[route]();
  }
  // Logado: default dashboard
  if (!parts.length || parts[0] === 'login' || parts[0] === 'signup') {
    location.hash = '/dashboard'; return;
  }
  const fn = ROUTES[parts[0]];
  if (!fn) { location.hash = '/dashboard'; return; }
  fn(parts.slice(1));
}

window.addEventListener('hashchange', handleRoute);

/* =========================================================================
 *  SHELL com Sidebar + Topbar (para telas autenticadas)
 * ========================================================================= */

function renderShell(activeKey, content) {
  const app = $('#app');
  app.innerHTML = '';

  // Pega 1a chave LIVE pra mostrar no rodape da sidebar
  const liveKey = (state.keys || []).find(k => k.mode === 'live') || (state.keys || [])[0];
  const userInitials = (state.me?.user?.name || 'U')
    .split(/\s+/).slice(0,2).map(s => s[0]).join('').toUpperCase();
  const company = state.me?.account?.companyName || 'Minha empresa';
  const userName = state.me?.user?.name || 'Usuario';
  const userEmail = state.me?.user?.email || '';

  const shell = el(`
    <div class="flex min-h-screen">
      <!-- ============= SIDEBAR ============= -->
      <aside class="w-[260px] flex-none bg-side-bg text-side-text flex flex-col">
        <!-- Brand -->
        <div class="px-5 py-5 flex items-center gap-2.5 border-b border-white/5">
          <span class="qr-logo" aria-hidden="true">
            <span></span><span></span><span class="off"></span><span></span>
            <span></span><span class="off"></span><span></span><span></span>
            <span class="off"></span><span></span><span></span><span class="off"></span>
            <span></span><span></span><span class="off"></span><span></span>
          </span>
          <div class="leading-tight">
            <div class="text-white font-bold text-[15px] tracking-tight">QR-API</div>
            <div class="text-[10.5px] text-side-muted -mt-0.5">WhatsApp API</div>
          </div>
        </div>

        <!-- Conta atual -->
        <div class="px-3 py-3 border-b border-white/5">
          <button type="button" class="w-full flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-white/5 transition text-left">
            <div class="w-8 h-8 rounded-lg bg-brand/15 text-brand-soft font-bold flex items-center justify-center text-[12px]">
              ${escapeHtml(company.substring(0,2).toUpperCase())}
            </div>
            <div class="flex-1 min-w-0">
              <div class="text-[13px] font-semibold text-white truncate">${escapeHtml(company)}</div>
              <div class="text-[11px] text-side-muted truncate">Workspace</div>
            </div>
            <i data-lucide="chevrons-up-down" class="w-4 h-4 text-side-muted"></i>
          </button>
        </div>

        <!-- Navegacao (scrollavel) -->
        <nav class="flex-1 overflow-y-auto side-scroll py-2">
          <div class="side-section-title">Geral</div>
          ${sideItem('dashboard',   'home',          'Dashboard',   activeKey, false)}
          ${sideItem('instances',   'server',        'Instances',   activeKey, false)}
          ${sideItem('messages',    'send',          'Messages',    activeKey, true)}
          ${sideItem('contacts',    'user-round',    'Contacts',    activeKey, true)}
          ${sideItem('templates',   'file-text',     'Templates',   activeKey, true)}

          <div class="side-section-title">Automacao</div>
          ${sideItem('webhooks',    'webhook',       'Webhooks',    activeKey, true)}
          ${sideItem('automations', 'workflow',      'Automations', activeKey, true)}
          ${sideItem('flows',       'git-branch',    'Flows',       activeKey, true)}

          <div class="side-section-title">Insights</div>

function logout() {

  token = null;

  toast('Voce saiu da sua conta', 'info');
  go('/login');
}

/* =========================================================================
 *  CARGA DE DADOS COMUNS (chamada apos login/signup e ao montar shell)
 * ========================================================================= */

async function loadCommonData() {
  try {
    const [me, instances, keys, plansData] = await Promise.all([
      api('/me'),
      api('/instances').catch(() => ({ data: [] })),
      api('/keys').catch(() => ({ data: [] })),
      api('/plans').catch(() => ({ data: [] })),
    ]);
    state.me = me;
    state.instances = instances.data || [];
    state.keys = keys.data || [];
    state.plans = plansData.data || [];
    state.providers = plansData.providers || { mercadopago: true, stripe: false };
    state.defaultProvider = plansData.defaultProvider || 'mercadopago';
  } catch (err) {
    // Se /me falhar com 401, faz logout
    if (/401|nao autorizado|invalid token/i.test(err.message)) {
      logout();
    } else {
      toast('Erro ao carregar dados: ' + err.message, 'error');
    }
  }
}

// Gera um SVG sparkline simples (ilustrativo)
function sparkline(kind) {
  // 8 pontos randomicos estaveis por kind
  const pts = kind === 'up'
    ? [12, 15, 13, 18, 16, 22, 20, 28]
    : kind === 'down'
    ? [28, 24, 26, 20, 22, 18, 14, 12]
    : [16, 18, 14, 17, 15, 16, 14, 16];
  const w = 100, h = 40;
  const max = Math.max(...pts), min = Math.min(...pts);
  const step = w / (pts.length - 1);
  const path = pts.map((v, i) => {
    const x = i * step;
    const y = h - ((v - min) / (max - min || 1)) * (h - 4) - 2;
    return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
  const area = path + ` L${w},${h} L0,${h} Z`;
  return `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" class="w-full h-full">
      <defs>
        <linearGradient id="sg-${kind}" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#00B84A" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#00B84A" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${area}" fill="url(#sg-${kind})"/>
      <path d="${path}" fill="none" stroke="#00B84A" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
  `;
}

function renderMessagingChart() {
  // Linha simples de 14 pontos com 3 series (sent/delivered/failed)
  const w = 480, h = 180;
  const points = (seed, off) => Array.from({ length: 14 }, (_, i) => {
    const v = 30 + Math.round(Math.sin(i * 0.6 + seed) * 12) + Math.round(Math.cos(i * 0.3) * 8) + off;
    return Math.max(8, v);
  });
  const series = [
    { name: 'Sent',      color: '#00B84A', pts: points(0, 20) },
    { name: 'Delivered', color: '#3B82F6', pts: points(2, 10) },
    { name: 'Failed',    color: '#EF4444', pts: points(4, -10) },
  ];
  const all = series.flatMap(s => s.pts);
  const max = Math.max(...all), min = Math.min(...all);
  const step = w / 13;
  const paths = series.map(s => {
    const d = s.pts.map((v, i) => {
      const x = i * step;
      const y = h - ((v - min) / (max - min || 1)) * (h - 30) - 15;
      return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    return `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />`;
  }).join('');
  return `
    <svg viewBox="0 0 ${w} ${h}" class="w-full h-[180px]">
      ${[0.25, 0.5, 0.75].map(y => `<line x1="0" x2="${w}" y1="${h*y}" y2="${h*y}" stroke="#E5EAF0" stroke-dasharray="2 4"/>`).join('')}
      ${paths}
    </svg>
    <div class="flex items-center justify-center gap-4 mt-2">
      ${series.map(s => `<div class="flex items-center gap-1.5 text-[12px] text-ink-2"><span class="w-2.5 h-2.5 rounded-full" style="background:${s.color}"></span>${s.name}</div>`).join('')}
    </div>
  `;
}

function renderDonutChart() {
  // Donut estatico ilustrativo
  const slices = [
    { name: 'Delivered', value: 78, color: '#00B84A' },
    { name: 'Pending',   value: 14, color: '#F59E0B' },
    { name: 'Failed',    value: 8,  color: '#EF4444' },
  ];
  const total = slices.reduce((a, s) => a + s.value, 0);
  const R = 60, r = 42, cx = 80, cy = 80;
  let acc = 0;
  const segs = slices.map(s => {
    const start = (acc / total) * 2 * Math.PI - Math.PI / 2;
    acc += s.value;
    const end = (acc / total) * 2 * Math.PI - Math.PI / 2;
    const large = (s.value / total) > 0.5 ? 1 : 0;
    const x1 = cx + R * Math.cos(start), y1 = cy + R * Math.sin(start);
    const x2 = cx + R * Math.cos(end),   y2 = cy + R * Math.sin(end);
    const xi1 = cx + r * Math.cos(end),  yi1 = cy + r * Math.sin(end);
    const xi2 = cx + r * Math.cos(start),yi2 = cy + r * Math.sin(start);
    return `<path d="M${x1},${y1} A${R},${R} 0 ${large} 1 ${x2},${y2} L${xi1},${yi1} A${r},${r} 0 ${large} 0 ${xi2},${yi2} Z" fill="${s.color}"/>`;
  }).join('');
  return `
    <div class="flex items-center gap-4">
      <svg viewBox="0 0 160 160" class="w-[140px] h-[140px]">
        ${segs}
        <text x="80" y="80" text-anchor="middle" dominant-baseline="middle" font-size="22" font-weight="700" fill="#111827">${slices[0].value}%</text>
        <text x="80" y="100" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#6B7280">delivered</text>
      </svg>
      <div class="space-y-2 flex-1">
        ${slices.map(s => `
          <div class="flex items-center justify-between text-[12.5px]">
            <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 rounded-full" style="background:${s.color}"></span>${s.name}</span>
            <span class="font-semibold text-ink">${s.value}%</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

window.openCreateKeyModal = function() {
  const body = el(`
    <form id="ck-form" class="space-y-4">
      <div>
        <label class="field-label" for="ck-name">Nome</label>
        <input id="ck-name" class="input" required placeholder="Producao backend" />
        <div class="field-help">Apelido para identificar onde a chave esta sendo usada.</div>
      </div>
      <div>
        <label class="field-label" for="ck-mode">Modo</label>
        <select id="ck-mode" class="select">
          <option value="live">LIVE, producao</option>
          <option value="test">TEST, sandbox</option>
        </select>
      </div>
      <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 flex items-start gap-2 text-[12.5px] text-amber-800">
        <i data-lucide="alert-triangle" class="w-4 h-4 mt-0.5"></i>
        <div>Voce vera a chave completa <b>uma unica vez</b>. Salve em local seguro.</div>
      </div>
    </form>
  `);
  const footer = el(`
    <div class="flex items-center gap-2">
      <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button type="button" class="btn btn-primary" id="ck-submit">
        <i data-lucide="key" class="w-4 h-4"></i> Criar chave
      </button>
    </div>
  `);
  openModal({ title: 'Nova chave de API', body, footer });
  $('#ck-submit').addEventListener('click', async () => {
    const name = $('#ck-name').value.trim();
    const mode = $('#ck-mode').value;
    if (!name) return;
    try {
      $('#ck-submit').disabled = true;
      const res = await api('/keys', { method: 'POST', body: { name, mode } });
      const raw = res.rawKey || res.key || res.token;
      await loadCommonData();
      closeModal();
      // Modal de exibicao unica
      showRawKeyModal(raw, name);
      if (location.hash === '#/developers') renderDevelopers();
    } catch (err) {
      toast(err.message, 'error');
      $('#ck-submit').disabled = false;
    }
  });
};

window.revokeKey = async function(id, name) {
  const body = el(`

window.openCheckoutModal = function(planId) {
  const plan = state.plans.find(p => p.id === planId);
  if (!plan) return;
  const providers = state.providers || {};
  const body = el(`
    <form id="co-form" class="space-y-4">
      <div class="bg-[#FAFBFC] border border-card-border rounded-lg p-3">
        <div class="text-[12.5px] text-ink-2">Voce esta assinando</div>
        <div class="text-[15px] font-semibold text-ink">${escapeHtml(plan.name)}</div>
        <div class="text-[12.5px] text-ink-2 mt-0.5">${money(plan.priceMonthlyBRL)} por instancia / mes</div>
      </div>
      <div>
        <label class="field-label" for="co-qty">Quantidade de instancias</label>
        <input id="co-qty" class="input" type="number" min="1" value="${plan.instancesIncluded || 1}" />
      </div>
      <div>
        <label class="field-label">Meio de pagamento</label>
        <div class="grid grid-cols-2 gap-2">
          <label class="border border-card-border rounded-lg p-3 flex items-center gap-2 cursor-pointer hover:border-brand has-[:checked]:border-brand has-[:checked]:bg-brand/5">
            <input type="radio" name="co-prov" value="mercadopago" ${providers.mercadopago ? 'checked' : 'disabled'} />
            <span class="text-[13px] font-semibold">Mercado Pago</span>
          </label>
          <label class="border border-card-border rounded-lg p-3 flex items-center gap-2 cursor-pointer hover:border-brand has-[:checked]:border-brand has-[:checked]:bg-brand/5 ${providers.stripe ? '' : 'opacity-50 cursor-not-allowed'}">
            <input type="radio" name="co-prov" value="stripe" ${providers.stripe && !providers.mercadopago ? 'checked' : ''} ${providers.stripe ? '' : 'disabled'} />
            <span class="text-[13px] font-semibold">Stripe</span>
          </label>
        </div>
      </div>
    </form>
  `);
  const footer = el(`
    <div class="flex items-center gap-2">
      <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button type="button" class="btn btn-primary" id="co-submit">
        <i data-lucide="lock" class="w-4 h-4"></i> Ir para pagamento
      </button>
    </div>
  `);
  openModal({ title: 'Assinar plano', body, footer, size: 520 });
  $('#co-submit').addEventListener('click', async () => {
    const quantity = parseInt($('#co-qty').value, 10) || 1;
    const provider = $('input[name=co-prov]:checked')?.value || state.defaultProvider;
    try {
      $('#co-submit').disabled = true;
      const res = await api('/billing/checkout', { method: 'POST', body: { planId, quantity, provider } });
      if (res.mock) {
        toast('Assinatura ativada em modo dev', 'success');
        closeModal();
        await loadCommonData();
        renderBilling();
      } else if (res.url) {
        window.location.href = res.url;
      }
    } catch (err) {
      toast(err.message, 'error');
      $('#co-submit').disabled = false;
    }
  });
};

window.openBillingPortal = async function() {
  try {
    const res = await api('/billing/portal', { method: 'POST' });
    if (res.url) window.open(res.url, '_blank');
    else toast('Portal indisponivel no momento', 'info');
  } catch (err) {
    toast(err.message, 'error');
  }
};

 * ========================================================================= */

(async function boot() {
  // Se ja tem token, carrega dados antes de rotear
  if (token) {
    await loadCommonData();
    if (!state.me) { handleRoute(); return; } // logout ocorreu
  }
  if (!location.hash) {
    location.hash = token ? '/dashboard' : '/login';
  } else {
    handleRoute();
  }
})();
